# ========================================
#        跑酷生成设置 — generation.yml
#        无尽跑酷 Infinite Parkour
#        默认语言：简体中文
# ========================================

# -= 跑酷生成设置 =-
generation:

  # -= 跳跃类型概率 =-
  # 每种跳跃类型的概率，总和可超过100%
  type:
    normal: 85       # 普通跳跃
    special: 10      # 特殊跳跃（冰、台阶等）
    schematic: 5     # 结构跳跃

  # -= 普通跳跃设置 =-
  normal:
    # -= 距离概率 =-
    # 不同跳跃距离的概率（%）
    distance:
      1: 10    # 1格
      2: 55    # 2格
      3: 34    # 3格
      4: 1     # 4格

    # -= 高度概率 =-
    # 不同跳跃高度的概率（%）
    height:
      1: 20    # 上升1格
      0: 65    # 水平
      -1: 10   # 下降1格
      -2: 5    # 下降2格

  # -= 特殊跳跃概率 =-
  special:
    ice: 50       # 浮冰
    slab: 30      # 台阶
    pane: 10      # 玻璃板
    fence: 10     # 栅栏

  # -= 跳跃范围设置 =-
  settings:

    # -= 最小 Y 值 =-
    # 跑酷生成的最低 Y 坐标
    # 如使用自定义世界，请设置为跑酷不会与地形交叉的高度
    min-y: 100

    # -= 最大 Y 值 =-
    # 跑酷生成的最高 Y 坐标
    # 如使用自定义世界，请设置为跑酷不会与地形交叉的高度
    max-y: 200

# -= 高级设置 =-
# 不确定用途的情况下请勿修改以下内容！
advanced:

  # -= 出生岛选项 =-
  island:
    spawn:

      # -= 玩家出生方块 =-
      # 玩家出生平台使用的方块材质
      # 粘贴结构后此方块将被替换为空气
      player-block: diamond_block

      # -= 出生朝向 =-
      yaw: -90
      pitch: 0

    parkour:

      # -= 起跑方块 =-
      # 跑酷起点的方块材质
      # 粘贴结构后此方块将被替换为空气
      begin-block: emerald_block

      # -= 方向 =-
      # 跑酷的方向
      # 可选: north（北）, south（南）, west（西）, east（东）
      heading: east

  # -= 区域大小 =-
  # 单人模式下玩家游戏区域的直径
  border-size: 10000

  # -= 结构冷却 =-
  # 两次结构跳跃之间的冷却方块数
  schematic-cooldown: 20
